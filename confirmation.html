<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | CogniFocus</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="assets/logo/app-logo.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://cognifocus.app/confirmation.html"
    />
    <meta property="og:title" content="Thank You | CogniFocus" />
    <meta
      property="og:description"
      content="Thank you for joining the CogniFocus waitlist. Check your email for updates and early access!"
    />

      property="og:image"
      content="https://cognifocus.app/assets/logo/app-logo.png"
    />
    <meta
      property="og:image:alt"
      content="CogniFocus app logo for a distraction-aware focus timer with character reactions"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://cognifocus.app/confirmation.html"
    />
    <meta property="twitter:title" content="Thank You | CogniFocus" />

      property="twitter:description"
      content="Thank you for joining the CogniFocus waitlist. Check your email for updates and early access!"
    />
    <meta
      property="twitter:image"
      content="https://cognifocus.app/assets/logo/app-logo.png"
    />
    <meta
      property="twitter:image:alt"
      content="CogniFocus app logo for a distraction-aware focus timer with character reactions"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="confirmation.css" />
  </head>
  <body class="confirmation-page">
    <nav
      class="navbar navbar-dark app-navbar px-4 d-flex justify-content-between align-items-center"
    >
      <div class="nav-brand">
        <img
          src="assets/logo/app-logo.png"
          class="logo me-2"
          alt="CogniFocus logo"
        />
        <span class="nav-brand-text">
          <span class="brand-text">CogniFocus</span>
          <span class="brand-emoji" aria-label="brain" title="Focus"
            >&#129504;</span
          >
        </span>
      </div>

      <div class="nav-actions d-flex align-items-center gap-2">
        <a href="/" class="nav-link-chip">Home</a>
        <a href="whats-new.html" class="nav-link-chip nav-update-link"
          >What's New &#128276;</a
        >
      </div>
    </nav>
    <main class="confirmation-main">
      <div class="thankyou-hero">
        <img
          src="assets/logo/app-logo.png"
          class="thankyou-logo"
          alt="CogniFocus logo"
        />
        <!-- Character reaction elements (moved above headline, no inline style) -->
        <img
          id="character-img"
          class="character-img mb-3 character-hidden"
          alt="Character Image"
        />
        <div id="message-box" class="mb-3"></div>
        <h1>You're In. &#9889;</h1>
        <p>
          You're officially on the waitlist.<br />Check your email for updates
          and early access.<br /><span class="highlight-text"
            >Stay focused until launch!</span
          >
        </p>
        <a href="/" class="waitlist-btn">Back to Home</a>
      </div>
    </main>
    <script src="shared.js"></script>
    <script src="script-confirmation.js"></script>
    <footer class="text-center py-4">
      <p class="small mb-2">
        CogniFocus &mdash; Focus, but alive. <span title="Alive">&#10024;</span>
      </p>
      <p class="small text-muted hero-muted-override">
        Built by
        <a
          href="https://qasimk2120.github.io/cognielevate/"
          target="_blank"
          rel="noopener"
          >CogniElevate</a
        >
        &#128640;
      </p>
      <p class="small mb-0 footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Use</a>
      </p>
    </footer>
  </body>
</html>
