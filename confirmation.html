<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | CogniFocus</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="assets/logo/app-logo.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="confirmation.css" />
  </head>
  <body class="confirmation-page">
    <nav class="navbar navbar-dark px-4">
      <div class="d-flex align-items-center">
        <img
          src="assets/logo/app-logo.png"
          class="logo me-2"
          alt="CogniFocus logo"
        />
        <span class="fw-bold"
          >CogniFocus
          <span aria-label="brain" title="Focus">&#129504;</span></span
        >
      </div>
    </nav>
    <main class="confirmation-main">
      <div class="thankyou-hero">
        <img
          src="assets/logo/app-logo.png"
          class="thankyou-logo"
          alt="CogniFocus logo"
        />
        <!-- Character reaction elements (moved above headline, no inline style) -->
        <img
          id="character-img"
          class="character-img mb-3 character-hidden"
          alt="Character Image"
        />
        <div id="message-box" class="mb-3"></div>
        <h1>You're In. &#9889;</h1>
        <p>
          You're officially on the waitlist.<br />Check your email for updates
          and early access.<br /><span class="highlight-text"
            >Stay focused until launch!</span
          >
        </p>
        <a href="index.html" class="waitlist-btn">Back to Home</a>
      </div>
    </main>
    <script src="shared.js"></script>
    <script src="script-confirmation.js"></script>
    <footer class="text-center py-4">
      <p class="small mb-2">
        CogniFocus &mdash; Focus, but alive. <span title="Alive">&#10024;</span>
      </p>
      <p class="small text-muted hero-muted-override">
        Built by
        <a
          href="https://qasimk2120.github.io/cognielevate/"
          target="_blank"
          rel="noopener"
          >CogniElevate</a
        >
        &#128640;
      </p>
      <p class="small mb-0">
        <a href="privacy.html">Privacy Policy</a>
      </p>
    </footer>
  </body>
</html>
