<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CogniFocus</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/favicon.png" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <img alt="CogniFocus Logo" src="assets/favicon.png" class="logo" />
      <h2>CogniFocus</h2>
    </header>

    <!-- Floating Background Characters -->
    <div class="floating-container">
      <img
        alt="Goblin Image"
        src="assets/characters/goblin/avatar/neutral.png"
        class="float goblin"
      />
      <img
        alt="Monk Image"
        src="assets/characters/monk/avatar/neutral.png"
        class="float monk"
      />
    </div>

    <!-- Hero Section -->
    <section class="hero">
      <h1>Stop Using Boring Timers.</h1>
      <p>Meet focus companions that react to your behavior.</p>
    </section>

    <!-- Reaction Demo -->
    <section class="demo">
      <div class="character-box">
        <img
          alt="Character Image"
          id="character-img"
          src="assets/characters/goblin/avatar/neutral.png"
        />
        <div id="message-box">Starting session...</div>
      </div>
    </section>

    <!-- Characters Section -->
    <section class="characters">
      <div class="card">
        <img
          alt="Goblin Image"
          src="assets/characters/goblin/avatar/cheerful.png"
        />
        <h3>Focus Goblin</h3>
        <p>Chaotic. Roasts you.</p>
      </div>

      <div class="card">
        <img alt="Monk Image" src="assets/characters/monk/avatar/neutral.png" />
        <h3>Monk Mode</h3>
        <p>Calm. Focused.</p>
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <p>CogniFocus - Focus, but alive.</p>
      <a href="https://qasimk2120.github.io/cognifocus-policy/" target="_blank">
        Privacy Policy
      </a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
